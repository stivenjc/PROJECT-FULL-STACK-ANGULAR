<!-- Main Layout Container -->
<div class="h-screen w-full bg-slate-50 flex flex-col overflow-hidden">

  <!-- ====== FIXED HEADER ====== -->
  <header
    class="w-full bg-white shadow-sm border-b border-slate-200 h-16 flex items-center justify-between px-6 z-10 shrink-0">
    <!-- Logo / Brand -->
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 bg-blue-600 text-white rounded-lg flex items-center justify-center font-bold text-xl">S</div>
      <span class="text-xl font-bold text-slate-800 tracking-tight">SocialApp</span>
    </div>

    <!-- Right Side Header Icons -->
    <div class="flex items-center gap-4">
      <button class="relative p-2 text-slate-500 hover:text-blue-600 transition-colors rounded-full hover:bg-slate-100">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
          class="w-6 h-6">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
        </svg>
        <span class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span>
      </button>

      <button class="p-2 text-slate-500 hover:text-blue-600 transition-colors rounded-full hover:bg-slate-100">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
          class="w-6 h-6">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M2.25 12.76c0 1.6 1.123 2.994 2.707 3.227 1.087.16 2.185.283 3.293.369V21l4.076-4.076a1.526 1.526 0 0 1 1.037-.443 48.282 48.282 0 0 0 5.68-.494c1.584-.233 2.707-1.626 2.707-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0 0 12 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018Z" />
        </svg>
      </button>

      <!-- Profile Avatar -->
      <div class="h-9 w-9 rounded-full bg-slate-200 border-2 border-slate-300 overflow-hidden cursor-pointer ml-2">
        <img [src]="usuarioService.getPhotoUrl(usuarioService.currentUser()?.foto)" alt="Avatar"
          class="w-full h-full object-cover">
      </div>
    </div>
  </header>
  <!-- ====== END FIXED HEADER ====== -->


  <!-- ====== MAIN CONTENT AREA (Sidebar + Outlet) ====== -->
  <div class="flex flex-1 overflow-hidden relative">

    <!-- LEFT SIDEBAR (Friends / Menu) -->
    <aside class="w-64 bg-white border-r border-slate-200 hidden md:flex flex-col h-full shrink-0">

      <!-- Menu Navigation -->
      <div class="p-4 flex-1 overflow-y-auto">
        <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-4 px-3">Menu</p>
        <nav class="space-y-1">
          <a routerLink="/posts" routerLinkActive="bg-blue-50 text-blue-700" [routerLinkActiveOptions]="{exact: true}"
            class="flex items-center gap-3 px-3 py-2.5 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-lg font-medium transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
            </svg>
            Feed / Posts
          </a>
          <a routerLink="/profile" routerLinkActive="bg-blue-50 text-blue-700"
            class="flex items-center gap-3 px-3 py-2.5 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-lg font-medium transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
              stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
            </svg>
            My Profile
          </a>
          <a routerLink="/friends" routerLinkActive="bg-blue-50 text-blue-700"
            class="flex items-center justify-between px-3 py-2.5 text-slate-600 hover:bg-slate-50 hover:text-slate-900 rounded-lg font-medium transition-colors">
            <div class="flex items-center gap-3">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M18 18.72a9.094-.479 3 3 0 0 0-4.682-2.72m.94 3.198.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0 1 12 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 0 1 6 18.719m12 0a5.971 5.971 0 0 0-.941-3.197m0 0A5.995 5.995 0 0 0 12 12.75a5.995 5.995 0 0 0-5.058 2.772m0 0a3 3 0 0 0-4.681 2.72 8.986 8.986 0 0 0 3.74.477m.94-3.197a5.971 5.971 0 0 0-.94 3.197M15 6.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm6 3a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Zm-13.5 0a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Z" />
              </svg>
              Friends
            </div>
            @if (usuarioService.pendingRequestsCount() > 0) {
            <span
              class="bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full min-w-[18px] text-center">
              {{ usuarioService.pendingRequestsCount() }}
            </span>
            }
          </a>
        </nav>
      </div>

    </aside>
    <!-- END LEFT SIDEBAR -->

    <!-- ====== CENTER DYNAMIC CONTENT (ROUTER OUTLET) ====== -->
    <!-- The components rendered inside the router-outlet will scroll independently here -->
    <main class="flex-1 overflow-y-auto p-4 md:p-8 bg-slate-50 relative">
      <div class="max-w-3xl mx-auto w-full">
        <!-- AQUÍ SE INYECTAN TUS POSTS, PERFIL, ETC -->
        <router-outlet></router-outlet>
      </div>
    </main>

  </div>

</div>
