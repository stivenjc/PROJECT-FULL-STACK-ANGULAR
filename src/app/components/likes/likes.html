<div class="flex flex-col">
  @if (likesCount() > 0) {
  <div class="flex items-center gap-1.5 px-4 py-1.5">
    <div class="flex -space-x-1">
      <div class="w-4 h-4 bg-blue-500 rounded-full flex items-center justify-center border border-white">
        <i class="fas fa-thumbs-up text-[8px] text-white"></i>
      </div>
    </div>
    <span class="text-slate-500 text-sm font-medium">{{ likesCount() }}</span>
  </div>
  }

  <div class="flex items-center justify-between px-4 py-1 border-t border-slate-100 gap-1">

    <button (click)="toggleLike()" [class.text-blue-600]="isLiked()" [class.text-slate-600]="!isLiked()"
      class="flex items-center gap-1.5 hover:bg-slate-100 flex-1 justify-center py-2 rounded-lg transition-colors font-semibold text-sm">

      @if (isLiked()) {
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
        <path
          d="M7.493 18.75c-.425 0-.82-.236-.975-.632A7.48 7.48 0 0 1 6 15.375c0-1.75.599-3.358 1.602-4.634.151-.192.373-.309.6-.397.473-.183.89-.514 1.212-.924a9.042 9.042 0 0 1 2.861-2.4c.723-.384 1.35-.956 1.653-1.715a4.498 4.498 0 0 0 .322-1.672V2.75a.75.75 0 0 1 .75-.75 2.25 2.25 0 0 1 2.25 2.25c0 1.152-.26 2.243-.723 3.218-.266.558.107 1.282.725 1.282h3.126c1.026 0 1.945.694 2.054 1.715.045.422.068.85.068 1.285a11.95 11.95 0 0 1-2.649 7.521c-.388.482-.987.729-1.605.729H13.48c-.483 0-.964-.078-1.423-.23l-3.114-1.04a4.501 4.501 0 0 0-1.423-.23H5.904" />
      </svg>
      } @else {
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
        class="w-5 h-5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M6.633 10.25c.806 0 1.533-.446 2.031-1.08a9.041 9.041 0 0 1 2.861-2.4c.723-.384 1.35-.956 1.653-1.715a4.498 4.498 0 0 0 .322-1.672V2.75a.75.75 0 0 1 .75-.75 2.25 2.25 0 0 1 2.25 2.25c0 1.152-.26 2.243-.723 3.218-.266.558.107 1.282.725 1.282h3.126c1.026 0 1.945.694 2.054 1.715.045.422.068.85.068 1.285a11.95 11.95 0 0 1-2.649 7.521c-.388.482-.987.729-1.605.729H13.48c-.483 0-.964-.078-1.423-.23l-3.114-1.04a4.501 4.501 0 0 0-1.423-.23H5.904m10.598-9.75H14.25M5.904 18.5c.083.205.173.405.27.602.197.4-.078.898-.523.898h-.908c-.889 0-1.713-.518-1.972-1.368a12 12 0 0 1-.521-3.507c0-1.553.295-3.036.831-4.398C3.387 9.953 4.167 9.5 5 9.5h1.053c.472 0 .745.551.446.918-.362.443-.626.962-.768 1.527a3.3 3.3 0 0 0-.019.044c-.161.424-.262.864-.302 1.314" />
      </svg>
      }
      <span>Me gusta</span>
    </button>

    <button (click)="commentToggled.emit()"
      class="flex-1 flex items-center justify-center gap-1.5 py-2 text-slate-600 hover:bg-slate-50 transition-colors rounded-lg font-semibold text-sm cursor-pointer">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
        class="w-5 h-5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M12 20.25c4.97 0 9-3.694 9-8.25s-4.03-8.25-9-8.25S3 7.43 3 11.996c0 2.29.825 4.385 2.217 6.002.348.406.883.676 1.436.882.51.196 1.042.346 1.583.475M12 20.25c-1.84 0-3.559-.441-5.068-1.206-.47-.237-.936-.45-1.393-.68m0 0-.825-1.144c-1.1-1.528-1.742-3.414-1.742-5.426" />
      </svg>
      <span>Comentar</span>
    </button>

    <button
      class="flex-1 flex items-center justify-center gap-1.5 py-2 text-slate-600 hover:bg-slate-50 transition-colors rounded-lg font-semibold text-sm cursor-pointer">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
        class="w-5 h-5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M7.217 10.907a2.25 2.25 0 1 0 0 2.186m0-2.186c.18.324.283.696.283 1.093s-.103.77-.283 1.093m0-2.186 9.566-5.314m-9.566 7.5 9.566 5.314m0 0a2.25 2.25 0 1 0 3.935 2.186 2.25 2.25 0 0 0-3.935-2.186Zm0-12.814a2.25 2.25 0 1 0 3.933-2.185 2.25 2.25 0 0 0-3.933 2.185Z" />
      </svg>
      <span>Compartir</span>
    </button>

  </div>
</div>
