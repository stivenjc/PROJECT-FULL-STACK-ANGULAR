<div class="px-4 py-3 bg-slate-50 border-t border-slate-100 space-y-3">

    @if (comments().length > 0) {
    <a href="javascript:void(0)" class="text-sm text-slate-500 font-medium hover:underline inline-block mb-1">
        View previous comments
    </a>
    }

    @for (comment of comments(); track comment.id) {
    <div class="flex gap-2 group">
        <img [src]="comment.created_data.foto" alt="{{comment.created_data.username}}"
            class="w-8 h-8 rounded-full object-cover shrink-0 mt-0.5">
        <div class="flex-1">
            @if (editingCommentId() === comment.id) {
                <div class="bg-white rounded-2xl p-2 border border-blue-200 shadow-sm">
                    <textarea 
                        [(ngModel)]="editCommentText"
                        class="w-full text-sm outline-none resize-none bg-transparent"
                        rows="2"></textarea>
                    <div class="flex justify-end gap-2 mt-1">
                        <button (click)="cancelEditComment()" 
                            class="px-2 py-0.5 text-xs font-semibold text-slate-500 hover:bg-slate-100 rounded">
                            Cancelar
                        </button>
                        <button (click)="saveEditComment(comment)" 
                            [disabled]="!editCommentText.trim()"
                            class="px-2 py-0.5 text-xs font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded disabled:opacity-50">
                            Guardar
                        </button>
                    </div>
                </div>
            } @else {
                <div class="bg-white rounded-2xl rounded-tl-none px-3 pt-2 pb-2.5 shadow-[0_1px_2px_rgba(0,0,0,0.05)] border border-slate-100 relative">
                    <h4 class="font-bold text-[13px] text-slate-800">{{ comment.created_data.username }}</h4>
                    <p class="text-[14px] text-slate-700 leading-tight mt-0.5">{{ comment.title }}</p>
                    
                    <div class="absolute -right-2 top-2 hidden group-hover:flex bg-white shadow-sm border border-slate-100 rounded-lg overflow-hidden">
                        <button (click)="startEditComment(comment)" title="Editar" class="p-1 hover:bg-slate-50 text-slate-400 hover:text-blue-500 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                                <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" />
                            </svg>
                        </button>
                        <button (click)="deleteComment(comment.id)" title="Eliminar" class="p-1 hover:bg-slate-50 text-slate-400 hover:text-red-500 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                                <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="flex gap-3 mt-1 ml-2 text-[11px] font-semibold text-slate-400">
                    <span class="hover:underline cursor-pointer">Like</span>
                    <span class="hover:underline cursor-pointer">Reply</span>
                    <span class="font-normal">{{ comment.modified | date:'MMM d, y, h:mm a' }}</span>
                </div>
            }
        </div>
    </div>
    }

    <div class="flex gap-2 mt-3 pt-2">
        <div class="w-8 h-8 rounded-full bg-slate-200 shrink-0"></div>
        <div class="flex-1 relative">
            <input type="text" [(ngModel)]="newCommentText" (keyup.enter)="submitComment(post.id)"
                class="w-full bg-slate-200/60 rounded-full pl-4 pr-10 py-1.5 text-sm outline-none focus:bg-white focus:ring-1 focus:ring-blue-400 transition-colors"
                placeholder="Write a comment...">
            <button (click)="submitComment(post.id)" [disabled]="!newCommentText.trim()"
                class="absolute right-2 top-1.5 text-blue-600 hover:text-blue-700 disabled:opacity-50 cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
                    <path
                        d="M3.478 2.404a.75.75 0 0 0-.926.941l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.519 60.519 0 0 0 18.445-8.986.75.75 0 0 0 0-1.218A60.517 60.517 0 0 0 3.478 2.404Z" />
                </svg>
            </button>
        </div>
    </div>

</div>
